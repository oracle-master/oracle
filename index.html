<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Оракул</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        body {
            background: #010003;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', 'Georgia', serif;
            padding: 12px 16px;
            margin: 0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 25%, #060212 0%, #010003 100%);
            z-index: -3;
        }
        .nebula-one {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 15% 30%, rgba(60, 30, 120, 0.12) 0%, transparent 45%);
            z-index: -2;
            animation: nebulaMove 45s infinite alternate;
        }
        .nebula-two {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 85% 70%, rgba(20, 40, 100, 0.08) 0%, transparent 55%);
            z-index: -2;
            animation: nebulaMove 55s infinite alternate-reverse;
        }
        @keyframes nebulaMove {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.06); }
        }
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: #f0e8ff;
            border-radius: 50%;
            opacity: 0;
            animation: starTwinkle 2.5s infinite ease-in-out;
            box-shadow: 0 0 15px #d0c0f0, 0 0 30px #a890d0;
        }
        .star:nth-child(3n) { background: #ffe8c0; box-shadow: 0 0 18px #ffd080, 0 0 35px #d4a040; }
        .star:nth-child(5n) { background: #c0d8ff; box-shadow: 0 0 20px #a0c0ff, 0 0 40px #6080d0; }
        .star:nth-child(7n) { background: #ffffff; box-shadow: 0 0 25px #ffffff, 0 0 50px #c0b0e0; }
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.15; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .main-title {
            font-family: 'Great Vibes', 'Cormorant Garamond', cursive;
            font-size: 56px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 16px;
            margin-top: 0;
            background: linear-gradient(135deg, #c9a84c 0%, #f8e8b0 20%, #d4af37 35%, #fff8e0 50%, #c0c0c0 65%, #e8d5a0 80%, #b8a880 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.6), 0 0 60px rgba(192, 192, 192, 0.4);
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
            text-align: center;
            line-height: 1.1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .title-deco-left, .title-deco-right {
            font-family: 'Times New Roman', serif;
            font-size: 36px;
            opacity: 0.6;
            background: linear-gradient(135deg, #c9a84c, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .crystal-container {
            max-width: 360px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-height: 0;
            justify-content: space-evenly;
        }
        
        /* ----- ГИПЕРРЕАЛИСТИЧНЫЙ 3D ХРУСТАЛЬНЫЙ ШАР ----- */
        .crystal-ball {
            /* Глубокий, многослойный градиент для объёма */
            background: 
                radial-gradient(circle at 28% 22%, 
                    rgba(255, 255, 255, 1) 0%, 
                    rgba(230, 240, 255, 0.85) 8%,
                    rgba(180, 200, 240, 0.5) 18%,
                    rgba(100, 130, 200, 0.4) 35%,
                    rgba(50, 70, 130, 0.6) 55%,
                    rgba(20, 30, 70, 0.9) 75%,
                    #050215 100%);
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            padding: 20px 18px;
            border: none;
            
            /* Многослойные тени для реализма */
            box-shadow: 
                0 0 100px rgba(100, 150, 255, 0.5),
                0 0 200px rgba(60, 80, 180, 0.3),
                0 20px 40px rgba(0, 0, 0, 0.6),
                inset 0 -15px 30px rgba(0, 0, 0, 0.4),
                inset 0 15px 25px rgba(255, 255, 255, 0.5),
                inset -12px -12px 25px rgba(0, 0, 0, 0.3),
                inset 12px 12px 30px rgba(255, 255, 255, 0.6);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 14px;
            animation: floatSphere 9s infinite ease-in-out;
            overflow: hidden;
            transform: perspective(800px) rotateX(2deg) rotateY(-3deg);
        }

        /* Главный яркий блик (острый, как на стекле) */
        .crystal-ball::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 8%;
            width: 30%;
            height: 18%;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 1) 0%, 
                rgba(255, 255, 255, 0.9) 25%,
                rgba(200, 220, 255, 0.3) 60%,
                transparent 85%);
            border-radius: 50%;
            filter: blur(3px);
            z-index: 4;
            transform: rotate(-15deg);
        }

        /* Второй острый блик */
        .crystal-ball::after {
            content: '';
            position: absolute;
            top: 22%;
            left: 20%;
            width: 6%;
            height: 4%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            filter: blur(1px);
            z-index: 5;
            box-shadow: 0 0 20px rgba(255, 255, 255, 1);
        }

        /* Нижний отсвет (отражение света) */
        .crystal-reflection {
            position: absolute;
            bottom: 10%;
            right: 8%;
            width: 25%;
            height: 12%;
            background: radial-gradient(circle, 
                rgba(180, 200, 255, 0.5) 0%, 
                rgba(100, 130, 220, 0.2) 50%,
                transparent 80%);
            border-radius: 50%;
            filter: blur(6px);
            z-index: 3;
        }

        /* Боковое свечение */
        .crystal-side-glow {
            position: absolute;
            top: 45%;
            right: 3%;
            width: 15%;
            height: 25%;
            background: radial-gradient(circle,
                rgba(200, 220, 255, 0.25) 0%,
                transparent 70%);
            border-radius: 50%;
            filter: blur(8px);
            z-index: 2;
        }

        /* Внутреннее магическое свечение */
        .inner-glow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 45% 40%, 
                rgba(120, 160, 255, 0.15) 0%, 
                rgba(60, 90, 180, 0.08) 40%,
                transparent 65%);
            z-index: 1;
            border-radius: 50%;
        }

        /* Тёмная сердцевина для глубины */
        .core-shadow {
            position: absolute;
            top: 50%; left: 50%;
            width: 65%; height: 65%;
            background: radial-gradient(circle,
                rgba(0, 0, 0, 0.4) 0%,
                transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 1;
            border-radius: 50%;
        }

        @keyframes floatSphere {
            0%, 100% { transform: perspective(800px) rotateX(2deg) rotateY(-3deg) translateY(0px); }
            50% { transform: perspective(800px) rotateX(3deg) rotateY(-5deg) translateY(-6px); }
        }

        .crystal-content {
            position: relative;
            z-index: 6;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .answer-screen {
            background: rgba(2, 1, 10, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 18px 8px;
            width: 100%;
            border: 1px solid rgba(150, 180, 255, 0.5);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(80, 120, 220, 0.5);
            margin-bottom: 12px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #answer-text {
            color: #f0f5ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 30px #a0c0ff, 0 0 12px #ffffff;
            line-height: 1.2;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.15s;
            font-style: italic;
            text-align: center;
            word-break: break-word;
        }
        .crystal-symbol {
            color: #6a8fd0;
            font-size: 14px;
            letter-spacing: 8px;
            opacity: 0.9;
            text-shadow: 0 0 12px #80a0e0;
        }
        .ritual-panel {
            background: rgba(5, 3, 12, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(90, 130, 200, 0.4);
            border-radius: 30px;
            padding: 8px 10px;
            margin-bottom: 12px;
            box-shadow: 0 0 20px rgba(40, 60, 120, 0.3);
            width: 100%;
        }
        .steps-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .step-row {
            color: #c0d0f0;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0.9;
        }
        .step-bullet {
            font-size: 12px;
            color: #a0b8e8;
            text-shadow: 0 0 8px #6080c0;
        }
        .ask-btn {
            background: #0a0418;
            border: 1.5px solid #6080c0;
            color: #dce8ff;
            font-size: 20px;
            padding: 14px 20px;
            width: 100%;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Times New Roman', serif;
            text-transform: uppercase;
            letter-spacing: 10px;
            font-weight: 400;
            box-shadow: 0 8px 0 #020106, 0 0 35px #4060a0;
            transition: all 0.08s;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #80a0e0;
        }
        .ask-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #020106, 0 0 50px #6080d0;
        }
        .ask-btn:disabled {
            opacity: 0.6;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #020106, 0 0 20px #3050a0;
        }
        .portal-status {
            color: #80a0d0;
            font-size: 11px;
            min-height: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 6px;
            font-weight: 400;
            text-shadow: 0 0 10px #4060b0;
        }
        .counter-text {
            color: #8098c8;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.9;
        }
        .flash-answer {
            animation: crystalAnswer 0.6s ease-out;
        }
        @keyframes crystalAnswer {
            0% { text-shadow: 0 0 10px #ffffff; }
            30% { text-shadow: 0 0 60px #c0d8ff, 0 0 120px #80b0f0, 0 0 20px #ffffff; }
            100% { text-shadow: 0 0 30px #a0c0ff, 0 0 12px #ffffff; }
        }
        .warning-nfc {
            color: #b88080;
            font-size: 9px;
            margin-top: 4px;
            letter-spacing: 2px;
            display: none;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="nebula-one"></div>
    <div class="nebula-two"></div>
    <div class="stars-layer" id="starsLayer"></div>
    <div class="main-title">
        <span class="title-deco-left">-=</span>
        Оракул
        <span class="title-deco-right">=-</span>
    </div>
    <div class="crystal-container">
        <div class="crystal-ball">
            <div class="inner-glow"></div>
            <div class="core-shadow"></div>
            <div class="crystal-reflection"></div>
            <div class="crystal-side-glow"></div>
            <div class="crystal-content">
                <div class="answer-screen">
                    <div id="answer-text">Судьба ждёт</div>
                </div>
                <div class="crystal-symbol">◈ ◈ ◈</div>
            </div>
        </div>
        <div class="ritual-panel">
            <div class="steps-column">
                <div class="step-row"><span class="step-bullet">•</span><span>ЗАДАЙ ВОПРОС</span></div>
                <div class="step-row"><span class="step-bullet">•</span><span>СОСРЕДОТОЧЬСЯ</span></div>
                <div class="step-row"><span class="step-bullet">•</span><span>НАЖМИ КНОПКУ</span></div>
                <div class="step-row"><span class="step-bullet">•</span><span>ПРИЛОЖИ БРЕЛОК</span></div>
            </div>
        </div>
        <button class="ask-btn" id="askButton">ЗАДАТЬ ВОПРОС</button>
        <div class="portal-status" id="portalStatus">Нажмите кнопку</div>
        <div class="warning-nfc" id="warningMsg">NFC недоступен. Используйте Chrome на Android.</div>
        <div class="counter-text"><span id="counterDisplay">0</span> ОТКРОВЕНИЙ</div>
    </div>
    <script>
        (function(){
            "use strict";
            function generateStars() {
                const layer = document.getElementById('starsLayer');
                for (let i = 0; i < 180; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 3.5 + 1;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 5 + 's';
                    star.style.animationDuration = (Math.random() * 2.5 + 1.5) + 's';
                    layer.appendChild(star);
                }
            }
            generateStars();
            const positive = ["Да", "Звёзды — да", "Всё сложится", "Благоприятно", "Не сомневайся", "Истинно", "Удача рядом", "Путь открыт", "Знаки добрые", "Верь в успех", "Так и будет", "Твоя правда", "Перспективы ясны", "Скоро", "Предначертано"];
            const neutral = ["Неясно", "Туманно", "Спроси позже", "Всё в твоих руках", "Время покажет", "Возможно", "Не сейчас", "Пятьдесят на пятьдесят", "Судьба молчит", "Размыто", "И да, и нет", "Неопределённо", "Доверься себе", "Переменчиво", "Равновесие"];
            const negative = ["Нет", "Звёзды против", "Не надейся", "Не в этот раз", "Отступись", "Путь закрыт", "Препятствия", "Не стоит", "Повремени", "Иллюзии", "Неблагоприятно", "Забудь", "Ловушка", "Ответ — нет", "Не сейчас"];
            const allAnswers = [...positive, ...neutral, ...negative];
            const answerElement = document.getElementById('answer-text');
            const askButton = document.getElementById('askButton');
            const portalStatus = document.getElementById('portalStatus');
            const warningMsg = document.getElementById('warningMsg');
            const counterSpan = document.getElementById('counterDisplay');
            let revelationCount = 0;
            try { const saved = localStorage.getItem('crystal_oracle_count'); if (saved) revelationCount = parseInt(saved, 10) || 0; } catch(e) {}
            function updateCounter() { counterSpan.textContent = revelationCount; try { localStorage.setItem('crystal_oracle_count', revelationCount); } catch(e) {} }
            updateCounter();
            let ndefReader = null;
            let isScanning = false;
            let cooldown = false;
            const COOLDOWN_TIME = 8000;
            function deliverProphecy() {
                if (!isScanning) return;
                if (cooldown) return;
                revelationCount++;
                updateCounter();
                const prophecy = allAnswers[Math.floor(Math.random() * allAnswers.length)];
                answerElement.style.opacity = '0.2';
                setTimeout(() => {
                    answerElement.textContent = prophecy;
                    answerElement.style.opacity = '1';
                    answerElement.classList.add('flash-answer');
                    setTimeout(() => answerElement.classList.remove('flash-answer'), 600);
                }, 70);
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(35);
                cooldown = true;
                portalStatus.textContent = 'Подождите немного...';
                if (ndefReader) { try { ndefReader.stop(); } catch(e) {} ndefReader = null; }
                isScanning = false;
                askButton.disabled = false;
                askButton.textContent = 'ЗАДАТЬ ВОПРОС';
                setTimeout(() => { cooldown = false; if (!isScanning) portalStatus.textContent = 'Нажмите кнопку'; }, COOLDOWN_TIME);
            }
            if (!('NDEFReader' in window)) {
                askButton.disabled = true;
                warningMsg.style.display = 'block';
                portalStatus.textContent = 'NFC не поддерживается';
            }
            async function startScan() {
                if (!('NDEFReader' in window)) { portalStatus.textContent = 'NFC недоступен'; return; }
                if (isScanning) { portalStatus.textContent = 'Сканер уже активен'; return; }
                if (cooldown) { portalStatus.textContent = 'Подождите немного...'; return; }
                try {
                    ndefReader = new NDEFReader();
                    portalStatus.textContent = 'Приложите брелок';
                    askButton.disabled = true;
                    askButton.textContent = 'ПРИЛОЖИТЕ БРЕЛОК';
                    isScanning = true;
                    await ndefReader.scan();
                    ndefReader.onreading = () => { deliverProphecy(); };
                    ndefReader.onreadingerror = () => { 
                        portalStatus.textContent = 'Ошибка чтения'; 
                        askButton.disabled = false;
                        askButton.textContent = 'ЗАДАТЬ ВОПРОС';
                        isScanning = false;
                    };
                } catch (error) {
                    portalStatus.textContent = 'Не удалось запустить';
                    askButton.disabled = false;
                    askButton.textContent = 'ЗАДАТЬ ВОПРОС';
                    isScanning = false;
                }
            }
            askButton.addEventListener('click', startScan);
        })();
    </script>
</body>
</html>
