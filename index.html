<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Оракул</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        body {
            background: #010003;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', 'Georgia', serif;
            padding: 12px 16px;
            margin: 0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 25%, #060212 0%, #010003 100%);
            z-index: -3;
        }
        .nebula-one {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 15% 30%, rgba(80, 40, 160, 0.15) 0%, transparent 45%);
            z-index: -2;
            animation: nebulaMove 45s infinite alternate;
        }
        .nebula-two {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 85% 70%, rgba(30, 60, 140, 0.1) 0%, transparent 55%);
            z-index: -2;
            animation: nebulaMove 55s infinite alternate-reverse;
        }
        @keyframes nebulaMove {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.08); }
        }
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: #f0e8ff;
            border-radius: 50%;
            opacity: 0;
            animation: starTwinkle 2.5s infinite ease-in-out;
            box-shadow: 0 0 15px #d0c0f0, 0 0 30px #a890d0;
        }
        .star:nth-child(3n) { background: #ffe8c0; box-shadow: 0 0 18px #ffd080, 0 0 35px #d4a040; }
        .star:nth-child(5n) { background: #c0d8ff; box-shadow: 0 0 20px #a0c0ff, 0 0 40px #6080d0; }
        .star:nth-child(7n) { background: #ffffff; box-shadow: 0 0 25px #ffffff, 0 0 50px #c0b0e0; }
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* ----- ПАДАЮЩИЕ ЗВЁЗДЫ ----- */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 80px 2px rgba(255, 255, 255, 0.8);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }
        .shooting-star::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
            transform-origin: left center;
            transform: rotate(-45deg) translateX(-100%);
            filter: blur(1px);
        }
        .shooting-star:nth-child(1) { top: 10%; left: 90%; animation: shootingStar 3s ease-in 1s infinite; }
        .shooting-star:nth-child(2) { top: 25%; left: 15%; animation: shootingStar 4s ease-in 3s infinite; }
        .shooting-star:nth-child(3) { top: 60%; left: 95%; animation: shootingStar 3.5s ease-in 5s infinite; }
        @keyframes shootingStar {
            0% { opacity: 0; transform: translateX(0) translateY(0); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-250px) translateY(250px); }
        }

        .main-title {
            font-family: 'Great Vibes', 'Cormorant Garamond', cursive;
            font-size: 56px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 12px;
            margin-top: 0;
            background: linear-gradient(135deg, #f0d060 0%, #fff8e0 20%, #d4af37 35%, #ffffff 50%, #c0c0c0 65%, #e8d5a0 80%, #b8a880 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.7), 0 0 80px rgba(192, 192, 192, 0.5);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.6));
            text-align: center;
            line-height: 1.1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: titleGlow 3s infinite alternate;
        }
        @keyframes titleGlow {
            0% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(192, 192, 192, 0.3); }
            100% { text-shadow: 0 0 50px rgba(255, 235, 100, 1), 0 0 100px rgba(255, 255, 255, 0.6); }
        }
        .title-deco-left, .title-deco-right {
            font-family: 'Times New Roman', serif;
            font-size: 36px;
            opacity: 0.8;
            background: linear-gradient(135deg, #d4af37, #f0e0a0, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .crystal-container {
            max-width: 360px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-height: 0;
            justify-content: center;
        }

        /* ----- ИДЕАЛЬНО КРУГЛЫЙ ШАР (БЕЗ КОНФЛИКТОВ) ----- */
        .crystal-ball {
            background: 
                radial-gradient(circle at 25% 20%, 
                    rgba(255, 255, 255, 1) 0%, 
                    rgba(220, 235, 255, 0.9) 6%,
                    rgba(160, 190, 255, 0.6) 15%,
                    rgba(100, 140, 230, 0.5) 30%,
                    rgba(60, 90, 180, 0.7) 50%,
                    rgba(30, 50, 120, 0.9) 70%,
                    #060420 100%);
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: none;
            
            box-shadow: 
                0 0 140px rgba(80, 160, 255, 0.7),
                0 0 250px rgba(50, 100, 220, 0.5),
                0 25px 45px rgba(0, 0, 0, 0.7),
                inset 0 -15px 30px rgba(0, 0, 0, 0.5),
                inset 0 15px 25px rgba(255, 255, 255, 0.6),
                inset -12px -12px 25px rgba(0, 0, 0, 0.4),
                inset 12px 12px 30px rgba(255, 255, 255, 0.7);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 14px;
            animation: floatSphere 6s infinite ease-in-out;
            overflow: hidden;
        }

        .crystal-content {
            position: relative;
            z-index: 6;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 16px;
        }

        .crystal-ball::before {
            content: '';
            position: absolute;
            top: 4%;
            left: 6%;
            width: 32%;
            height: 18%;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 1) 0%, 
                rgba(255, 255, 255, 0.95) 20%,
                rgba(200, 220, 255, 0.3) 55%,
                transparent 85%);
            border-radius: 50%;
            filter: blur(2.5px);
            z-index: 4;
            transform: rotate(-12deg);
            animation: mainGlint 4s infinite ease-in-out;
        }
        @keyframes mainGlint {
            0%, 100% { opacity: 0.8; width: 32%; height: 18%; }
            50% { opacity: 1; width: 35%; height: 20%; }
        }

        .crystal-ball::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 18%;
            width: 5%;
            height: 3.5%;
            background: rgba(255, 255, 255, 1);
            border-radius: 50%;
            filter: blur(0.8px);
            z-index: 5;
            box-shadow: 0 0 25px rgba(255, 255, 255, 1);
            animation: secondGlint 3s infinite ease-in-out;
        }
        @keyframes secondGlint {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .crystal-reflection {
            position: absolute;
            bottom: 8%;
            right: 6%;
            width: 28%;
            height: 14%;
            background: radial-gradient(circle, 
                rgba(160, 200, 255, 0.6) 0%, 
                rgba(80, 130, 230, 0.25) 50%,
                transparent 80%);
            border-radius: 50%;
            filter: blur(5px);
            z-index: 3;
            animation: reflectionPulse 5s infinite alternate;
        }
        @keyframes reflectionPulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        .crystal-side-glow {
            position: absolute;
            top: 40%;
            right: 2%;
            width: 20%;
            height: 30%;
            background: radial-gradient(circle,
                rgba(180, 220, 255, 0.3) 0%,
                transparent 70%);
            border-radius: 50%;
            filter: blur(10px);
            z-index: 2;
        }

        .inner-glow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 45% 45%, 
                rgba(140, 200, 255, 0.4) 0%, 
                rgba(80, 140, 255, 0.2) 30%,
                rgba(40, 80, 180, 0.1) 55%,
                transparent 70%);
            z-index: 1;
            border-radius: 50%;
            animation: corePulse 4s infinite alternate;
        }
        @keyframes corePulse {
            0% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .core-shadow {
            position: absolute;
            top: 50%; left: 50%;
            width: 60%; height: 60%;
            background: radial-gradient(circle,
                rgba(0, 0, 0, 0.5) 0%,
                rgba(10, 5, 30, 0.3) 40%,
                transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 1;
            border-radius: 50%;
        }

        @keyframes floatSphere {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        .answer-screen {
            background: rgba(2, 1, 10, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 18px 8px;
            width: 100%;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 0 25px rgba(212, 175, 55, 0.4);
            margin-bottom: 12px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #answer-text {
            color: #f5f0ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 30px #d4af37, 0 0 15px #ffffff;
            line-height: 1.2;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.2s;
            font-style: italic;
            text-align: center;
            word-break: break-word;
        }

        .answer-reveal {
            animation: textReveal 0.8s ease-out forwards;
        }
        @keyframes textReveal {
            0% { opacity: 0; filter: blur(8px); transform: scale(0.9); text-shadow: 0 0 50px #d4af37; }
            50% { filter: blur(4px); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); text-shadow: 0 0 30px #d4af37, 0 0 15px #ffffff; }
        }

        .crystal-symbol {
            color: #d4af37;
            font-size: 14px;
            letter-spacing: 8px;
            opacity: 0.9;
            text-shadow: 0 0 15px #ffd700, 0 0 30px #b8900c;
            animation: symbolPulse 2s infinite alternate;
        }
        @keyframes symbolPulse {
            0% { opacity: 0.6; text-shadow: 0 0 10px #d4af37; }
            100% { opacity: 1; text-shadow: 0 0 25px #ffd700, 0 0 40px #b8900c; }
        }

        .ritual-panel {
            background: rgba(5, 3, 12, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.6);
            border-radius: 30px;
            padding: 8px 10px;
            margin-bottom: 12px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            width: 100%;
        }

        .steps-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .step-row {
            color: #e8dcc8;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0.95;
        }

        .step-bullet {
            font-size: 12px;
            color: #d4af37;
            text-shadow: 0 0 10px #ffd700;
        }

        .ask-btn {
            background: #0a0418;
            border: 2px solid #d4af37;
            color: #f5ecc0;
            font-size: 20px;
            padding: 14px 20px;
            width: 100%;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Times New Roman', serif;
            text-transform: uppercase;
            letter-spacing: 10px;
            font-weight: 500;
            box-shadow: 0 8px 0 #020106, 0 0 45px #d4af37;
            transition: all 0.08s;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #ffd700;
            animation: btnPulse 2.5s infinite ease-in-out;
        }
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 8px 0 #020106, 0 0 35px #d4af37; border-color: #d4af37; }
            50% { box-shadow: 0 8px 0 #020106, 0 0 60px #ffd700, 0 0 80px #ffec80; border-color: #ffec80; }
        }

        .ask-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #020106, 0 0 70px #ffd700;
        }

        .ask-btn:disabled {
            opacity: 0.6;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #020106, 0 0 25px #b8900c;
            animation: none;
        }

        .portal-status {
            color: #d4c890;
            font-size: 11px;
            min-height: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 6px;
            font-weight: 400;
            text-shadow: 0 0 10px #b8900c;
        }

        .counter-text {
            color: #c0b090;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.9;
            text-shadow: 0 0 8px #b8900c;
        }

        .warning-nfc {
            color: #c08080;
            font-size: 9px;
            margin-top: 4px;
            letter-spacing: 2px;
            display: none;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="nebula-one"></div>
    <div class="nebula-two"></div>
    <div class="stars-layer" id="starsLayer"></div>
    
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <div class="main-title">
        <span class="title-deco-left">-=</span>
        Оракул
        <span class="title-deco-right">=-</span>
    </div>

    <div class="crystal-container">
        <div class="crystal-ball">
            <div class="inner-glow"></div>
            <div class="core-shadow"></div>
            <div class="crystal-reflection"></div>
            <div class="crystal-side-glow"></div>
            <div class="crystal-content">
                <div class="answer-screen">
                    <div id="answer-text">Судьба ждёт</div>
                </div>
                <div class="crystal-symbol">◈ ◈ ◈</div>
            </div>
        </div>

        <div class="ritual-panel">
            <div class="steps-column">
                <div class="step-row"><span class="step-bullet">•</span><span>ЗАДАЙ ВОПРОС</span></div>
                <div class="step-row"><span class="step-bullet">•</span><span>СОСРЕДОТОЧЬСЯ</span></div>
                <div class="step-row"><span class="step-bullet">•</span><span>НАЖМИ КНОПКУ</span></div>
                <div class="step-row"><span class="step-bullet">•</span><span>ПРИЛОЖИ БРЕЛОК</span></div>
            </div>
        </div>

        <button class="ask-btn" id="askButton">ЗАДАТЬ ВОПРОС</button>
        <div class="portal-status" id="portalStatus">Нажмите кнопку</div>
        <div class="warning-nfc" id="warningMsg">NFC недоступен. Используйте Chrome на Android.</div>
        <div class="counter-text"><span id="counterDisplay">0</span> ОТКРОВЕНИЙ</div>
    </div>

    <script>
        (function(){
            "use strict";

            function generateStars() {
                const layer = document.getElementById('starsLayer');
                for (let i = 0; i < 180; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 3.5 + 1;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 5 + 's';
                    star.style.animationDuration = (Math.random() * 2.5 + 1.5) + 's';
                    layer.appendChild(star);
                }
            }
            generateStars();

            function playMagicSound() {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.type = 'sine';
                    oscillator.frequency.value = 880;
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'triangle';
                    osc2.frequency.value = 1320;
                    gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.25);
                } catch(e) {}
            }

            const positive = ["Да", "Звёзды — да", "Всё сложится", "Благоприятно", "Не сомневайся", "Истинно", "Удача рядом", "Путь открыт", "Знаки добрые", "Верь в успех", "Так и будет", "Твоя правда", "Перспективы ясны", "Скоро", "Предначертано"];
            const neutral = ["Неясно", "Туманно", "Спроси позже", "Всё в твоих руках", "Время покажет", "Возможно", "Не сейчас", "Пятьдесят на пятьдесят", "Судьба молчит", "Размыто", "И да, и нет", "Неопределённо", "Доверься себе", "Переменчиво", "Равновесие"];
            const negative = ["Нет", "Звёзды против", "Не надейся", "Не в этот раз", "Отступись", "Путь закрыт", "Препятствия", "Не стоит", "Повремени", "Иллюзии", "Неблагоприятно", "Забудь", "Ловушка", "Ответ — нет", "Не сейчас"];
            const allAnswers = [...positive, ...neutral, ...negative];

            const answerElement = document.getElementById('answer-text');
            const askButton = document.getElementById('askButton');
            const portalStatus = document.getElementById('portalStatus');
            const warningMsg = document.getElementById('warningMsg');
            const counterSpan = document.getElementById('counterDisplay');

            let revelationCount = 0;
            try { const saved = localStorage.getItem('crystal_oracle_count'); if (saved) revelationCount = parseInt(saved, 10) || 0; } catch(e) {}
            function updateCounter() { counterSpan.textContent = revelationCount; try { localStorage.setItem('crystal_oracle_count', revelationCount); } catch(e) {} }
            updateCounter();

            let ndefReader = null;
            let isScanning = false;
            let cooldown = false;
            const COOLDOWN_TIME = 8000;

            function deliverProphecy() {
                if (!isScanning) return;
                if (cooldown) return;
                
                revelationCount++;
                updateCounter();
                
                const prophecy = allAnswers[Math.floor(Math.random() * allAnswers.length)];
                
                answerElement.classList.remove('answer-reveal');
                void answerElement.offsetWidth;
                answerElement.textContent = prophecy;
                answerElement.classList.add('answer-reveal');
                
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(40);
                playMagicSound();
                
                cooldown = true;
                portalStatus.textContent = 'Подождите немного...';
                
                if (ndefReader) { try { ndefReader.stop(); } catch(e) {} ndefReader = null; }
                isScanning = false;
                askButton.disabled = false;
                askButton.textContent = 'ЗАДАТЬ ВОПРОС';
                
                setTimeout(() => { 
                    cooldown = false; 
                    if (!isScanning) portalStatus.textContent = 'Нажмите кнопку'; 
                }, COOLDOWN_TIME);
            }

            if (!('NDEFReader' in window)) {
                askButton.disabled = true;
                warningMsg.style.display = 'block';
                portalStatus.textContent = 'NFC не поддерживается';
            }

            async function startScan() {
                if (!('NDEFReader' in window)) { portalStatus.textContent = 'NFC недоступен'; return; }
                if (isScanning) { portalStatus.textContent = 'Сканер уже активен'; return; }
                if (cooldown) { portalStatus.textContent = 'Подождите немного...'; return; }
                
                try {
                    ndefReader = new NDEFReader();
                    portalStatus.textContent = 'Приложите брелок';
                    askButton.disabled = true;
                    askButton.textContent = 'ПРИЛОЖИТЕ БРЕЛОК';
                    isScanning = true;
                    
                    await ndefReader.scan();
                    
                    ndefReader.onreading = () => { deliverProphecy(); };
                    ndefReader.onreadingerror = () => { 
                        portalStatus.textContent = 'Ошибка чтения'; 
                        askButton.disabled = false;
                        askButton.textContent = 'ЗАДАТЬ ВОПРОС';
                        isScanning = false;
                    };
                } catch (error) {
                    portalStatus.textContent = 'Не удалось запустить';
                    askButton.disabled = false;
                    askButton.textContent = 'ЗАДАТЬ ВОПРОС';
                    isScanning = false;
                }
            }

            askButton.addEventListener('click', startScan);
        })();
    </script>
</body>
